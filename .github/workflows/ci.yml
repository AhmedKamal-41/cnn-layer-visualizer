name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # No package-lock.json: cache ~/.npm from package.json hash (not npm's lockfile cache)
      - name: Cache npm downloads
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package.json') }}

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov

      - name: Lint with ruff
        run: ruff check app --select E,F,W,I --ignore E501,E402

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          TESTING: "true"

  docker-build:
    name: Docker build + smoke (compose)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        env:
          DOCKER_BUILDKIT: 1
        run: docker compose build

      - name: Smoke test (containers + health)
        run: |
          docker compose up -d
          echo "Waiting for backend health endpoint..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/api/v1/health >/dev/null; then
              echo "Backend is up."
              docker compose down
              exit 0
            fi
            sleep 2
          done
          echo "Timeout waiting for backend."
          docker compose logs
          docker compose down
          exit 1
